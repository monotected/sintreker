<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Счётчик Грехов</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root { --blood:#8b0000; --ember:#c0392b; --gold:#c9a84c; --parchment:#1a0a00; --ash:#2d1a0e; --bone:#d4b896; --hell-glow:#ff4500; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0400; color:var(--bone); font-family:'Crimson Text',serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; bottom:0; left:0; right:0; height:40vh; background:radial-gradient(ellipse at 50% 100%,rgba(200,50,0,0.25),transparent 70%); pointer-events:none; animation:hellglow 3s ease-in-out infinite alternate; }
  @keyframes hellglow { from{opacity:.6} to{opacity:1} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .shake { animation: shake 0.2s ease-in-out; }

  .container { max-width:480px; margin:0 auto; padding:20px 16px 80px; position:relative; z-index:1; }
  header { text-align:center; padding:24px 0 16px; }
  .title-main { font-family:'UnifrakturMaguntia',cursive; font-size:3rem; color:var(--blood); text-shadow:0 0 20px rgba(200,0,0,0.6); line-height:1; }
  .title-sub { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:6px; color:var(--gold); text-transform:uppercase; margin-top:6px; opacity:.8; }
  .date-display { font-family:'Cinzel',serif; font-size:.7rem; color:rgba(212,184,150,0.4); margin-top:6px; letter-spacing:2px; }
  hr.ornament { border:none; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); margin:14px 0; opacity:.4; }

  /* OWL */
  .owl-section { position:relative; margin-bottom:16px; }
  .owl-bubble { background:linear-gradient(135deg,#0d0500,#1a0a00); border:1px solid rgba(139,0,0,0.5); border-radius:12px; padding:14px 16px 14px 80px; min-height:70px; display:flex; align-items:center; }
  .owl-bubble::after { content:''; position:absolute; left:65px; bottom:-8px; width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-top:8px solid rgba(139,0,0,0.5); }
  .owl-text { font-style:italic; font-size:.88rem; line-height:1.5; color:rgba(212,184,150,0.9); }
  .owl-container { position:absolute; left:8px; bottom:-5px; width:68px; height:90px; cursor:pointer; z-index:10; }
  .owl-svg { width:100%; height:100%; filter:drop-shadow(0 0 8px rgba(200,0,0,0.4)); transition:transform .15s; }
  .owl-container:active .owl-svg { transform:scale(.92); }

  @keyframes owl-idle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes owl-angry { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-8deg) scale(1.05)} 75%{transform:rotate(8deg) scale(1.05)} }
  @keyframes owl-happy { 0%,100%{transform:scale(1)} 30%{transform:scale(1.12) rotate(-5deg)} 60%{transform:scale(1.12) rotate(5deg)} }
  @keyframes owl-scared { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .owl-svg.idle{animation:owl-idle 2.5s ease-in-out infinite} .owl-svg.angry{animation:owl-angry .4s ease-in-out infinite} .owl-svg.happy{animation:owl-happy .5s ease-in-out infinite} .owl-svg.scared{animation:owl-scared .3s ease-in-out 3}

  .prayer-timer-bar { height:3px; background:rgba(139,0,0,0.2); border-radius:2px; margin-top:4px; overflow:hidden; }
  .prayer-timer-fill { height:100%; width:0%; background:linear-gradient(to right,var(--blood),var(--ember)); border-radius:2px; transition:width .5s linear; }

  /* SINS GRID - MAXIMUM STABILITY */
  .sins-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
  .sin-card {
    background:linear-gradient(135deg,var(--ash),var(--parchment));
    border:1px solid rgba(139,0,0,0.4);
    border-radius:8px;
    padding:12px 10px;
    cursor:pointer;
    transition:all .2s ease;
    text-align:center; /* Самый надежный способ центрировать */
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    position:relative;
    overflow:hidden;
  }
  .sin-card.flash { border-color:var(--ember); transform:scale(.96); box-shadow:0 0 16px rgba(200,0,0,0.5); background:linear-gradient(135deg,#3d0000,#1a0a00); }

  .sin-icon { font-size:1.8rem; display:block; margin-bottom:4px; }
  .sin-name { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:1px; color:var(--gold); text-transform:uppercase; display:block; margin-bottom:6px; }
  
  /* Счетчик - защищен от схлопывания */
  .sin-count {
    font-family:'UnifrakturMaguntia',cursive;
    font-size:2.2rem;
    color:#cc0000;
    text-shadow:0 0 12px rgba(200,0,0,0.6);
    line-height:1;
    display:block; /* Гарантия переноса строки */
    min-height:2.2rem; /* Жесткое ограничение высоты */
    margin-bottom:8px;
  }

  .sin-btn-row { display:flex; justify-content:center; gap:8px; }
  .btn-minus,.btn-plus { width:28px; height:28px; border-radius:50%; border:1px solid rgba(139,0,0,0.6); background:rgba(100,0,0,0.3); color:var(--bone); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; line-height:1; }
  .btn-plus { background:rgba(139,0,0,0.45); color:#ff8080; }
  .btn-minus:active,.btn-plus:active { transform:scale(.82); }

  /* TOTAL & CHART & PRAYERS CSS remains identical to previous stable version */
  .total-block { background:linear-gradient(135deg,#1a0000,var(--ash)); border:1px solid var(--blood); border-radius:10px; padding:16px; text-align:center; margin-bottom:18px; box-shadow:0 0 30px rgba(139,0,0,0.15); }
  .total-label { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:4px; color:rgba(212,184,150,0.4); text-transform:uppercase; }
  .total-number { font-family:'UnifrakturMaguntia',cursive; font-size:4rem; color:var(--ember); text-shadow:0 0 20px rgba(200,0,0,0.7); line-height:1; transition:all .3s; }
  .total-number.bump { transform:scale(1.2); color:#ff2200; }
  .total-text { font-style:italic; font-size:.85rem; color:rgba(212,184,150,0.55); margin-top:4px; }

  .chart-section { background:linear-gradient(135deg,var(--parchment),var(--ash)); border:1px solid rgba(139,0,0,0.3); border-radius:10px; padding:16px; margin-bottom:18px; }
  .section-title { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:3px; color:var(--gold); text-transform:uppercase; text-align:center; margin-bottom:14px; }
  .hell-meter { position:relative; width:170px; height:170px; margin:0 auto 14px; }
  .hell-meter svg { transform:rotate(-90deg); }
  .hell-meter-label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
  .hell-pct { font-family:'UnifrakturMaguntia',cursive; font-size:2.1rem; color:var(--ember); text-shadow:0 0 12px rgba(200,0,0,0.6); display:block; }
  .hell-verdict { font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:1px; color:var(--gold); text-transform:uppercase; display:block; }
  .bar-chart { display:flex; align-items:flex-end; justify-content:space-around; height:70px; gap:4px; padding-bottom:4px; border-bottom:1px solid rgba(139,0,0,0.3); margin-bottom:6px; }
  .bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; }
  .bar { width:100%; max-width:28px; border-radius:3px 3px 0 0; background:linear-gradient(to top,var(--blood),var(--ember)); min-height:2px; transition:height .5s cubic-bezier(.34,1.56,.64,1); box-shadow:0 0 8px rgba(200,0,0,0.3); }
  .bar-label { font-size:.6rem; color:rgba(212,184,150,0.4); margin-top:3px; text-align:center; }

  .prayers-section { background:linear-gradient(135deg,#0d0a00,var(--ash)); border:1px solid rgba(201,168,76,0.2); border-radius:10px; padding:16px; margin-bottom:18px; }
  .prayer-card { background:rgba(0,0,0,0.3); border:1px solid rgba(201,168,76,0.15); border-radius:8px; padding:14px; margin-bottom:10px; position:relative; cursor:pointer; transition:border-color .3s; }
  .prayer-card:last-child { margin-bottom:0; }
  .prayer-card.reading { border-color:var(--gold); box-shadow:0 0 12px rgba(201,168,76,0.2); }
  .prayer-card.done { border-color:#2d5a2d; background:rgba(0,50,0,0.2); }
  .prayer-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .prayer-badge { display:inline-block; background:var(--blood); color:var(--bone); font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:1px; text-transform:uppercase; padding:2px 8px; border-radius:3px; }
  .prayer-status { font-size:.55rem; color:rgba(212,184,150,0.4); font-family:'Cinzel',serif; }
  .prayer-card.reading .prayer-status { color:var(--gold); }
  .prayer-card.done .prayer-status { color:#4a9a4a; }
  .prayer-text { font-style:italic; font-size:.88rem; line-height:1.6; color:rgba(212,184,150,0.82); }
  .prayer-name { font-family:'Cinzel',serif; font-size:.6rem; color:var(--gold); letter-spacing:2px; margin-top:8px; opacity:.6; }
  .prayer-progress { height:2px; background:rgba(201,168,76,0.1); border-radius:2px; margin-top:10px; overflow:hidden; }
  .prayer-progress-fill { height:100%; width:0%; background:linear-gradient(to right,var(--gold),#ffdd88); border-radius:2px; transition:width .3s linear; }
  .prayer-card.done .prayer-progress-fill { width:100%!important; background:#4a9a4a; }
  .btn-read { display:block; width:100%; margin-top:10px; padding:8px; background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3); border-radius:6px; color:var(--gold); font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
  .prayer-card.done .btn-read { color:#4a9a4a; border-color:rgba(74,154,74,0.3); }

  .reset-btn { display:block; width:100%; padding:14px; background:linear-gradient(135deg,#1a0000,#2d0000); border:1px solid rgba(139,0,0,0.4); border-radius:8px; color:rgba(212,184,150,0.4); font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:3px; text-transform:uppercase; cursor:pointer; }
  .reset-btn:active { background:rgba(139,0,0,0.2); color:var(--bone); }

  .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .particle { position:absolute; bottom:-20px; width:4px; height:4px; border-radius:50%; background:var(--hell-glow); opacity:0; animation:float-up linear infinite; box-shadow:0 0 6px var(--hell-glow); }
  @keyframes float-up { 0%{transform:translateY(0) scale(1);opacity:0} 20%{opacity:.6} 80%{opacity:.3} 100%{transform:translateY(-60vh) translateX(var(--drift)) scale(.2);opacity:0} }

  .owl-popup { position:fixed; bottom:-200px; left:50%; transform:translateX(-50%); width:90%; max-width:360px; background:linear-gradient(135deg,#0d0500,#1f0a00); border:2px solid var(--blood); border-radius:16px; padding:20px 20px 20px 90px; box-shadow:0 0 40px rgba(200,0,0,0.4); z-index:100; transition:bottom .5s cubic-bezier(.34,1.3,.64,1); min-height:90px; display:flex; align-items:center; }
  .owl-popup.show { bottom:20px; }
  .owl-popup-owl { position:absolute; left:10px; bottom:0; width:75px; height:95px; }
  .owl-popup-text { font-family:'Crimson Text',serif; font-style:italic; font-size:.92rem; line-height:1.5; color:var(--bone); }
  .owl-popup-close { position:absolute; top:8px; right:10px; background:none; border:none; color:rgba(212,184,150,0.4); font-size:1rem; cursor:pointer; }
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="container" id="mainContainer">
  <header>
    <div class="title-main">Грехи</div>
    <div class="title-sub">Ежедневный учёт</div>
    <div class="date-display" id="dateDisplay"></div>
  </header>
  <hr class="ornament">
  <div class="owl-section">
    <div class="owl-bubble"><div class="owl-text" id="owlText">Здравствуй, грешник. Я слежу за каждым твоим движением.</div></div>
    <div class="prayer-timer-bar"><div class="prayer-timer-fill" id="timerFill"></div></div>
    <div class="owl-container" onclick="owlClicked()">
      <svg class="owl-svg idle" id="owlSvg" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="85" rx="32" ry="38" fill="#1a2800"/><ellipse cx="50" cy="88" rx="28" ry="34" fill="#0d1800"/>
        <ellipse cx="20" cy="90" rx="14" ry="22" fill="#0f1f00" transform="rotate(-15,20,90)"/><ellipse cx="80" cy="90" rx="14" ry="22" fill="#0f1f00" transform="rotate(15,80,90)"/>
        <ellipse cx="50" cy="95" rx="18" ry="22" fill="#2d4400"/><ellipse cx="50" cy="48" rx="26" ry="26" fill="#1a2800"/>
        <polygon points="28,28 22,8 36,22" fill="#0d1800"/><polygon points="72,28 78,8 64,22" fill="#0d1800"/>
        <circle cx="38" cy="48" r="13" fill="#330000" opacity=".8"/><circle cx="62" cy="48" r="13" fill="#330000" opacity=".8"/>
        <circle cx="38" cy="48" r="11" fill="#ffeecc"/><circle cx="62" cy="48" r="11" fill="#ffeecc"/>
        <circle cx="38" cy="48" r="7" fill="#cc0000" id="irisLMain"/><circle cx="62" cy="48" r="7" fill="#cc0000" id="irisRMain"/>
        <circle cx="38" cy="48" r="4" fill="#000"/><circle cx="62" cy="48" r="4" fill="#000"/>
        <circle cx="40" cy="46" r="1.5" fill="white"/><circle cx="64" cy="46" r="1.5" fill="white"/>
        <polygon points="50,54 44,62 56,62" fill="#c9a84c"/>
        <path d="M40,68 Q50,62 60,68" stroke="#0d1800" stroke-width="2" fill="none" id="owlMouthMain"/>
        <line x1="40" y1="122" x2="30" y2="128" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
        <line x1="40" y1="122" x2="38" y2="129" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
        <line x1="40" y1="122" x2="46" y2="129" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
        <line x1="60" y1="122" x2="70" y2="128" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
        <line x1="60" y1="122" x2="62" y2="129" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
        <line x1="60" y1="122" x2="54" y2="129" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
        <path d="M46,88 L54,88 M50,84 L50,96" stroke="#8b0000" stroke-width="2.5" opacity=".7"/>
        <circle cx="38" cy="48" r="11" fill="none" stroke="#ff0000" stroke-width="1" opacity=".5"/>
        <circle cx="62" cy="48" r="11" fill="none" stroke="#ff0000" stroke-width="1" opacity=".5"/>
      </svg>
    </div>
  </div>

  <!-- СЮДА ОТРИСОВЫВАЮТСЯ ГРЕХИ -->
  <div class="sins-grid" id="sinsGrid"></div>

  <div class="total-block">
    <div class="total-label">Всего грехов сегодня</div>
    <div class="total-number" id="totalCount">0</div>
    <div class="total-text" id="totalText">Начни с чистого листа...</div>
  </div>
  <hr class="ornament">
  <div class="chart-section">
    <div class="section-title">опец Путь к Аду копец</div>
    <div class="hell-meter">
      <svg width="170" height="170" viewBox="0 0 170 170">
        <circle cx="85" cy="85" r="65" fill="none" stroke="rgba(139,0,0,0.2)" stroke-width="13"/>
        <circle cx="85" cy="85" r="65" fill="none" stroke="url(#fireGrad)" stroke-width="13" stroke-linecap="round" stroke-dasharray="408.4" stroke-dashoffset="408.4" id="hellArc" style="transition: stroke-dashoffset 0.8s cubic-bezier(0.34,1.1,0.64,1)"/>
        <defs><linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#8b0000"/><stop offset="100%" stop-color="#ff4500"/></linearGradient></defs>
      </svg>
      <div class="hell-meter-label"><span class="hell-pct" id="hellPct">0%</span><span class="hell-verdict" id="hellVerdict">Праведник</span></div>
    </div>
    <div class="bar-chart" id="barChart"></div>
  </div>
  <div class="prayers-section">
    <div class="section-title">✝ Покаяние ✝</div>
    <div id="prayersContainer"></div>
  </div>
  <button class="reset-btn" onclick="resetDay()">⊕ Новый День ⊕</button>
</div>

<div class="owl-popup" id="owlPopup">
  <div class="owl-popup-owl">
    <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="85" rx="32" ry="38" fill="#1a2800"/><ellipse cx="50" cy="88" rx="28" ry="34" fill="#0d1800"/>
      <ellipse cx="20" cy="90" rx="14" ry="22" fill="#0f1f00" transform="rotate(-15,20,90)"/><ellipse cx="80" cy="90" rx="14" ry="22" fill="#0f1f00" transform="rotate(15,80,90)"/>
      <ellipse cx="50" cy="95" rx="18" ry="22" fill="#2d4400"/><ellipse cx="50" cy="48" rx="26" ry="26" fill="#1a2800"/>
      <polygon points="28,28 22,8 36,22" fill="#0d1800"/><polygon points="72,28 78,8 64,22" fill="#0d1800"/>
      <circle cx="38" cy="48" r="11" fill="#ffeecc"/><circle cx="62" cy="48" r="11" fill="#ffeecc"/>
      <circle cx="38" cy="48" r="7" fill="#cc0000" id="irisLPop"/><circle cx="62" cy="48" r="7" fill="#cc0000" id="irisRPop"/>
      <circle cx="38" cy="48" r="4" fill="#000"/><circle cx="62" cy="48" r="4" fill="#000"/>
      <circle cx="40" cy="46" r="1.5" fill="white"/><circle cx="64" cy="46" r="1.5" fill="white"/>
      <polygon points="50,54 44,62 56,62" fill="#c9a84c"/>

    </svg>
  </div>
  <div class="owl-popup-text" id="owlPopupText"></div>
  <button class="owl-popup-close" onclick="closePopup()">✕</button>
</div>

<script>
// АУДИО
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function playTone(f,d,t='sine',v=.1){if(!audioCtx)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,audioCtx.currentTime);g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+d);}catch(e){}}
function playSinSound(){playTone(120,.4,'sawtooth',.08)}function playForgiveSound(){playTone(800,.15);setTimeout(()=>playTone(1000,.2),100)}function playAngrySound(){playTone(200,.3,'square',.06)}function playPrayerDoneSound(){playTone(600,.15);setTimeout(()=>playTone(800,.15),100);setTimeout(()=>playTone(1100,.3),200)}

// ВСЕ 8 ГРЕХОВ НА МЕСТЕ
const SINS = [
  { id:'pride',    icon:'👑', name:'Гордыня',      weight:3 },
  { id:'greed',    icon:'💰', name:'Алчность',     weight:2 },
  { id:'lust',     icon:'🔥', name:'Похоть',       weight:3 },
  { id:'envy',     icon:'💚', name:'Зависть',      weight:2 },
  { id:'gluttony', icon:'🍖', name:'Чревоугодие',  weight:1 },
  { id:'wrath',    icon:'⚡', name:'Гнев',         weight:2 },
  { id:'sloth',    icon:'😴', name:'Уныние',       weight:1 },
  { id:'lie',      icon:'🗣️', name:'Ложь',         weight:2 },
];

const VERDICTS = [[0,0,'Праведник'],[1,10,'Слегка запятнан'],[11,20,'Грешник'],[21,35,'Заядлый грешник'],[36,50,'Одержимый'],[51,70,'Добро пожаловать в ад'],[71,90,'Любимец дьявола'],[91,100,'Дьявол завидует']];
const PRAYERS_DATA = [
  { id:'p1', badge:'Покаяние', name:'Молитва Иисусова', text:'Господи, Иисусе Христе, Сыне Божий, помилуй мя, грешного.', secs:15 },
  { id:'p2', badge:'Прощение', name:'Псалом 50', text:'Помилуй мя, Боже, по велицей милости Твоей и по множеству щедрот Твоих очисти беззаконие мое...', secs:30 },
  { id:'p3', badge:'Смирение', name:'Молитва перед сном', text:'Господи Боже мой, аще согреших днесь словом, делом и помышлением, яко благ и Человеколюбец прости ми...', secs:25 },
];
const L={idle:['Я вижу тебя.','Ты молился сегодня?','Каждый грех записан.','Не думай, что я отвернулась.','Читай молитвы.','Хух. Хух.'],sin:['...ещё один.','Хорошо. Продолжай.','Ад расширяется.','Дьявол аплодирует.','ХУХ. Ты серьёзно?','Записано. Навечно.'],pS:['Наконец-то. Читай.','Хорошо. Не отвлекайся.','Молитва начата.'],pD:['Засчитано. Может быть.','Неплохо. Осталось ещё.','Хух. Принято.'],pSk:['Ты пропустил молитву.','Сова недовольна.','ХУХ ХУХ ХУХ. ЧИТАЙ.'],aD:['Все молитвы прочитаны. Почти.','Молодец. До завтра.','Покаяние принято.']};
const F={idle:{m:'M40,68 Q50,62 60,68',i:'#cc0000'},angry:{m:'M40,70 Q50,65 60,70',i:'#ff0000'},happy:{m:'M40,64 Q50,72 60,64',i:'#00cc00'},scared:{m:'M38,66 Q50,72 62,66',i:'#ff8800'}};

const today = new Date().toDateString();
let counts = JSON.parse(localStorage.getItem('sins_counts') || '{}');
if (localStorage.getItem('sins_date') !== today) { counts = {}; localStorage.setItem('sins_date', today); }
SINS.forEach(s => { if (!counts[s.id]) counts[s.id] = 0; });
let prayerState = JSON.parse(localStorage.getItem('prayer_state') || '{}');
PRAYERS_DATA.forEach(p => { if (!prayerState[p.id]) prayerState[p.id] = 'idle'; });
let activeTimer = null, owlMood = 'idle', popupTimeout = null;

function save() { localStorage.setItem('sins_counts', JSON.stringify(counts)); localStorage.setItem('prayer_state', JSON.stringify(prayerState)); }
function say(a){return a[Math.floor(Math.random()*a.length)]}
function getTotal(){return SINS.reduce((s,sin)=>s+(counts[sin.id]||0),0)}
function getWeighted(){return SINS.reduce((s,sin)=>s+(counts[sin.id]||0)*sin.weight,0)}
function getHellPct(){return Math.min(100,Math.round(getWeighted()/0.6))}
function getVerdict(p){for(const[l,h,v]of VERDICTS)if(p>=l&&p<=h)return v;return VERDICTS[VERDICTS.length-1][2]}

function setOwlMood(m,t){
  owlMood=m;document.getElementById('owlSvg').className.baseVal='owl-svg '+m;if(t)document.getElementById('owlText').textContent=t;
  const f=F[m]||F.idle;
  document.getElementById('owlMouthMain').setAttribute('d',f.m);document.getElementById('irisLMain').setAttribute('fill',f.i);document.getElementById('irisRMain').setAttribute('fill',f.i);
  document.getElementById('owlMouthPop').setAttribute('d',f.m);document.getElementById('irisLPop').setAttribute('fill',f.i);document.getElementById('irisRPop').setAttribute('fill',f.i);
}

function owlClicked(){initAudio();const t=getTotal();if(t===0)showPopup(say(['Пока чист.','Ни одного греха?','Хух. Посмотрим.']));else if(t<5)showPopup(say(['Неплохо. Но я слежу.','Читай молитвы.']));else{showPopup(say(['Ты разочаровал меня.','ХУХ ХУХ.','Иди молиться.']));setOwlMood('scared',say(L.idle));setTimeout(()=>setOwlMood('idle',say(L.idle)),2000)}}
function showPopup(t){clearTimeout(popupTimeout);document.getElementById('owlPopupText').textContent=t;document.getElementById('owlPopup').classList.add('show');popupTimeout=setTimeout(()=>document.getElementById('owlPopup').classList.remove('show'),4000)}
function closePopup(){document.getElementById('owlPopup').classList.remove('show')}
setInterval(()=>{if(owlMood==='idle'&&Math.random()<.3)setOwlMood('idle',say(L.idle))},8000);

function renderSins(){
  const grid=document.getElementById('sinsGrid');grid.innerHTML='';
  SINS.forEach(sin=>{
    const div=document.createElement('div');div.className='sin-card';div.id='card-'+sin.id;
    div.innerHTML=`<span class="sin-icon">${sin.icon}</span><span class="sin-name">${sin.name}</span><div class="sin-count" id="cnt-${sin.id}">${counts[sin.id]}</div><div class="sin-btn-row"><button class="btn-minus" onclick="changeSin('${sin.id}',-1,event)">−</button><button class="btn-plus" onclick="changeSin('${sin.id}',+1,event)">+</button></div>`;
    grid.appendChild(div);
  });
}

function changeSin(id,d,e){
  e.stopPropagation();initAudio();
  counts[id]=Math.max(0,(counts[id]||0)+d);
  document.getElementById('cnt-'+id).textContent=counts[id];
  if(d>0){document.getElementById('card-'+id).classList.add('flash');setTimeout(()=>document.getElementById('card-'+id).classList.remove('flash'),300);playSinSound();spawnParticles(3);if(navigator.vibrate)navigator.vibrate(50);document.getElementById('mainContainer').classList.add('shake');setTimeout(()=>document.getElementById('mainContainer').classList.remove('shake'),200);setOwlMood('angry',say(L.sin));setTimeout(()=>setOwlMood('idle',say(L.idle)),3000);showPopup(say(L.sin))}
  else if(d<0){playForgiveSound()}
  save();renderTotal();renderChart();
}

function renderTotal(){
  const t=getTotal(),el=document.getElementById('totalCount');el.textContent=t;el.classList.add('bump');setTimeout(()=>el.classList.remove('bump'),300);
  const m=[[0,0,'Начни с чистого листа...'],[1,5,'Небольшие погрешности...'],[6,15,'Уже задумайся.'],[16,30,'Пора исповедаться.'],[31,50,'Ты идёшь вниз.'],[51,100,'Ад ждёт.'],[101,999,'Дьявол готовит комнату.']];
  for(const[l,h,tx]of m)if(t>=l&&t<=h){document.getElementById('totalText').textContent=tx;break}
}

function renderChart(){
  const p=getHellPct(),c=408.4;document.getElementById('hellArc').style.strokeDashoffset=c-c*p/100;
  document.getElementById('hellPct').textContent=p+'%';document.getElementById('hellVerdict').textContent=getVerdict(p);
  const bc=document.getElementById('barChart'),max=Math.max(1,...SINS.map(s=>counts[s.id]||0));
  bc.innerHTML=SINS.map(s=>{const h=Math.round(((counts[s.id]||0)/max)*64);return`<div class="bar-wrap"><div class="bar" style="height:${Math.max(2,h)}px"></div><div class="bar-label">${s.icon}</div></div>`}).join('');
}

function renderPrayers(){
  document.getElementById('prayersContainer').innerHTML=PRAYERS_DATA.map(p=>{
    const s=prayerState[p.id]||'idle',st=s==='idle'?'не прочитано':s==='reading'?'📖 читаю...':'✓ прочитано',bt=s==='done'?'✓ Прочитано':s==='reading'?'Читаю...':'Читать под надзором';
    return`<div class="prayer-card ${s==='reading'?'reading':s==='done'?'done':''}" id="pcard-${p.id}"><div class="prayer-header"><span class="prayer-badge">${p.badge}</span><span class="prayer-status">${st}</span></div><div class="prayer-text">${p.text}</div><div class="prayer-name">— ${p.name}</div><div class="prayer-progress"><div class="prayer-progress-fill" id="pprog-${p.id}"></div></div><button class="btn-read" onclick="startPrayer('${p.id}')" ${s==='reading'?'disabled':''}>${bt}</button></div>`
  }).join('');
}

function startPrayer(id){
  initAudio();if(prayerState[id]==='done')return;
  if(activeTimer){clearInterval(activeTimer.interval);document.getElementById('timerFill').style.width='0%';playAngrySound();showPopup(say(L.pSk));setOwlMood('scared',say(L.pSk));setTimeout(()=>setOwlMood('idle',say(L.idle)),3000);activeTimer=null}
  prayerState[id]='reading';save();renderPrayers();
  const p=PRAYERS_DATA.find(x=>x.id===id),tot=p.secs;let el=0;
  setOwlMood('idle',say(L.pS));showPopup(say(L.pS));
  const fill=document.getElementById('pprog-'+id),tf=document.getElementById('timerFill');
  const intv=setInterval(()=>{el++;const pc=Math.min(100,(el/tot)*100);if(fill)fill.style.width=pc+'%';if(tf)tf.style.width=pc+'%';
  if(el===Math.floor(tot*.5))setOwlMood('idle','Половина пути.');
  if(el>=tot){clearInterval(intv);activeTimer=null;prayerState[id]='done';save();renderPrayers();if(tf)tf.style.width='0%';playPrayerDoneSound();setOwlMood('happy',say(L.pD));showPopup(say(L.pD));setTimeout(()=>setOwlMood('idle',say(L.idle)),3000);spawnParticles(2);if(PRAYERS_DATA.every(x=>prayerState[x.id]==='done'))setTimeout(()=>{setOwlMood('happy',say(L.aD));showPopup(say(L.aD))},2000)}},1000);
  activeTimer={interval:intv};
}

function spawnParticles(n){for(let i=0;i<n;i++)setTimeout(()=>{const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*window.innerWidth}px;--drift:${(Math.random()-.5)*80}px;animation-duration:${2+Math.random()*2}s;width:${3+Math.random()*4}px;height:${3+Math.random()*4}px;`;document.getElementById('particles').appendChild(p);setTimeout(()=>p.remove(),4500)},i*150)}
setInterval(()=>{if(getTotal()>0)spawnParticles(1)},1200);

function resetDay(){if(!confirm('Начать новый день?'))return;if(activeTimer){clearInterval(activeTimer.interval);activeTimer=null}SINS.forEach(s=>counts[s.id]=0);PRAYERS_DATA.forEach(p=>prayerState[p.id]='idle');save();renderSins();renderTotal();renderChart();renderPrayers();document.getElementById('timerFill').style.width='0%';setOwlMood('idle','Новый день. Хух.')}

document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
renderSins();renderTotal();renderChart();renderPrayers();
setTimeout(()=>showPopup('Здравствуй, грешник.'),1200);
</script>
</body>
</html>
